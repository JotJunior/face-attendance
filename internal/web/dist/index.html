<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Painel de Administração — Controle de Presença Facial" />
  <title>Presença Facial — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/assets/app.css" />
</head>
<body>

<div class="app is-login" id="app">

  <!-- mobile backdrop -->
  <div class="scrim" id="scrim" aria-hidden="true"></div>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Navegação principal">
    <div class="sidebar-logo">
      <div class="logo-mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="9" r="3.4"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>
      </div>
      <div style="line-height:1.25; min-width:0;">
        <div class="name">Presença Facial</div>
        <div class="sub mono">admin · v1.0</div>
      </div>
    </div>

    <nav class="sidebar-nav" role="list">
      <div class="nav-section">Operação</div>
      <button class="nav-item" data-route="dashboard" role="listitem">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        <span>Visão geral</span>
      </button>
      <button class="nav-item" data-route="devices" role="listitem">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3" y="4" width="18" height="7" rx="2"/><rect x="3" y="13" width="18" height="7" rx="2"/></svg>
        <span>Dispositivos</span>
      </button>
      <button class="nav-item" data-route="members" role="listitem">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 5.5a3 3 0 0 1 0 5.5"/><path d="M18 19a4.8 4.8 0 0 0-2.5-4"/></svg>
        <span>Membros</span>
      </button>
      <button class="nav-item" data-route="events" role="listitem">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M22 12h-4l-3 8-6-16-3 8H2"/></svg>
        <span>Eventos</span>
      </button>
    </nav>

    <div class="sidebar-foot">
      <div class="gob-chip">
        <span class="dot sm dot-on" aria-hidden="true"></span>
        <div style="line-height:1.3; min-width:0;">
          <div class="t1">Sincronização GOB</div>
          <div class="t2 mono">automática · a cada ciclo</div>
        </div>
      </div>
      <div class="user-row">
        <div class="user-av" aria-hidden="true">OP</div>
        <div style="line-height:1.25; flex:1; min-width:0;">
          <div class="uname">operador</div>
          <div class="urole">administrador</div>
        </div>
        <button class="icon-btn sm" id="logout-btn" title="Encerrar sessão" aria-label="Sair">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main" role="main">
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false" aria-controls="sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div style="min-width:0;">
        <div class="ttl" id="page-title">Visão geral</div>
        <div class="tsub" id="page-sub">Painel administrativo</div>
      </div>
      <div class="topbar-actions">
        <div class="topsearch">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="top-search" placeholder="Buscar membro, CPF…" aria-label="Buscar membro ou CPF" autocomplete="off" />
        </div>
        <button class="icon-btn" id="theme-btn" title="Alternar tema" aria-label="Alternar tema claro/escuro"></button>
        <button class="btn btn-accent" id="sync-btn">
          <svg id="sync-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.5 15a9 9 0 1 1-2.1-9.4L23 10"/></svg>
          <span id="sync-label">Sincronizar</span>
        </button>
      </div>
    </header>

    <div class="view" id="view" aria-live="polite"><!-- screens render here --></div>
  </main>
</div>

<!-- modal + toast roots -->
<div id="modal-root"></div>
<div class="toast-wrap" id="toast-wrap" aria-live="polite" aria-atomic="false" role="region" aria-label="Notificações"></div>

<script type="module" src="/admin/assets/app.js"></script>
</body>
</html>
